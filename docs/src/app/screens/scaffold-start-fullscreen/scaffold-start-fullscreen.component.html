<u-scaffold>
  <u-top-app-bar slot="top-bar" headline="Start pane — fullscreen collapse">
    <u-icon-button
      slot="leading-icon"
      routerLink="/components/scaffold"
      aria-label="Back to docs"
    >
      <span class="material-symbols-outlined">arrow_back</span>
    </u-icon-button>
  </u-top-app-bar>

  <u-scaffold-pane position="start" variant="filled" collapse-mode="fullscreen" #pane>
    <div slot="header" class="pane-header">
      <strong>Browse</strong>
      <u-icon-button (click)="$any(pane).close()">
        <span class="material-symbols-outlined">close</span>
      </u-icon-button>
    </div>
    <div class="pane-body">
      <p>This pane takes over the entire viewport when collapsed on mobile. Useful for richer browse / picker experiences.</p>
    </div>
  </u-scaffold-pane>

  <div class="screen-content">
    <p>Below 1200px the pane covers the screen instead of sliding in as a sidebar.</p>
    <u-button (click)="$any(pane).show()">Open browse pane</u-button>
  </div>
</u-scaffold>
