<u-scaffold>
  <u-top-app-bar slot="top-bar" headline="Start pane — sidebar collapse">
    <u-icon-button
      slot="leading-icon"
      routerLink="/components/scaffold"
      aria-label="Back to docs"
    >
      <span class="material-symbols-outlined">arrow_back</span>
    </u-icon-button>
  </u-top-app-bar>

  <u-pane mode="sidebar" mode-lg="fixed" variant="filled" #pane style="width: 220px;">
    <div slot="header" class="pane-header">
      <strong>Navigation</strong>
      <u-icon-button (click)="$any(pane).close()">
        <span class="material-symbols-outlined">close</span>
      </u-icon-button>
    </div>
    <u-list>
      <u-list-item>Home</u-list-item>
      <u-list-item>Projects</u-list-item>
      <u-list-item>Settings</u-list-item>
    </u-list>
  </u-pane>

  <div class="screen-content">
    <p>On a viewport ≥ 1200px (<code>lg</code>) the start pane is permanent. Below that it collapses to a sidebar overlay — open it with the button below.</p>
    <u-button (click)="$any(pane).show()">Open start pane</u-button>
  </div>
</u-scaffold>
