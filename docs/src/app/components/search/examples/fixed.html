<!--
  When rendered with the default `position="fixed"` the search bar is pinned
  to the top of the viewport. The example below stays static for the docs
  layout, but exposes the same template you'd use in a real app shell.
-->
<u-search
  position="static"
  placeholder="Search products"
>
  <u-icon-button slot="leading-icon">
    <span class="material-symbols-outlined">search</span>
  </u-icon-button>
  <u-icon-button slot="trailing-icon">
    <span class="material-symbols-outlined">tune</span>
  </u-icon-button>
</u-search>
