<docs-title title="Select" tag="u-select, u-option">Represents a control that provides a menu of options. Mirrors the behavior of the native `&lt;select&gt;` and integrates with Angular forms via the `SelectControlValueAccessor` directive.</docs-title>

></docs-example>

  sectionTitle="Variants"
></docs-example>
<docs-example
  [html]="statesHtml"
  sectionTitle="Bound to ngModel"
  [renderExample]="false"
>
  <div example class="u-column">
    <u-select
      label="State"
      [(ngModel)]="state"
      ngDefaultControl
    >
      @for (s of states; track s) {
        <u-option [value]="s">{{ s }}</u-option>
      }
    </u-select>
    <p>Selected: {{ state }}</p>
  </div>
</docs-example>
