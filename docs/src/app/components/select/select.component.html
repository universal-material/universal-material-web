<u-select
  label="States"
  [(ngModel)]="batata"
  ngDefaultControl
>
  @if (render()) {
    @for (state of states; track state; let index = $index) {
      <u-option [value]="state">{{ state }} </u-option>
    }
  }
</u-select>
