<docs-title title="Snackbars" tag="u-snackbar">Brief, transient messages shown at the bottom of the screen. Created imperatively via `Snackbar.show()`.</docs-title>

<docs-example
  sectionTitle="Usage"
  [renderExample]="false"
  [html]="exampleHtml"
>
  <div example class="u-column">
    <u-text-field
      label="Message"
      [(ngModel)]="message"
      ngDefaultControl
    ></u-text-field>
    <u-text-field
      label="Action"
      [(ngModel)]="action"
      ngDefaultControl
    ></u-text-field>
    <u-button (click)="showSnackbar()">Show snackbar</u-button>
  </div>
</docs-example>

<docs-apis-table key="snackbar"></docs-apis-table>
