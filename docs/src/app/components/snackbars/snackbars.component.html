<docs-title title="Snackbars">Brief, transient messages shown at the bottom of the screen. Created imperatively via `UmSnackbar.show()`.</docs-title>

<docs-example
  sectionTitle="Usage"
  [renderExample]="false"
  [html]="exampleHtml"
>
  <u-text-field
    label="Message"
    [(ngModel)]="message"
    ngDefaultControl
  ></u-text-field>
  <u-text-field
    label="Action"
    [(ngModel)]="action"
    ngDefaultControl
  ></u-text-field>
  <u-button (click)="showSnackbar()">Show snackbar</u-button>
</docs-example>

<docs-apis-table key="snackbar"></docs-apis-table>
