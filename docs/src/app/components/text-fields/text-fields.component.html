<docs-title
  title="Text fields"
  tag="u-text-field, u-text-area"
  >Single-line and multi-line inputs that let users enter and edit text.</docs-title
>

<docs-example
  sectionTitle="Live"
  [renderExample]="false"
  [html]="template"
  alignment="stretch"
>
  <div class="field-playground">
    <div class="field-playground-control">
      <span class="field-playground-label">Variant</span>
      <u-chip-set>
        <u-chip
          clickable
          [selected]="variant === 'filled'"
          (click)="setVariant('filled')"
        >
          <span
            class="material-symbols-outlined"
            slot="icon-selected"
            >done</span
          >
          Filled
        </u-chip>
        <u-chip
          clickable
          [selected]="variant === 'outlined'"
          (click)="setVariant('outlined')"
        >
          <span
            class="material-symbols-outlined"
            slot="icon-selected"
            >done</span
          >
          Outlined
        </u-chip>
      </u-chip-set>
    </div>

    <div class="field-playground-control">
      <span class="field-playground-label">Slots</span>
      <u-chip-set>
        <u-chip
          toggle
          [selected]="leadingIcon"
          (change)="leadingIcon = $any($event.target).selected; updated$.next()"
        >
          <span
            class="material-symbols-outlined"
            slot="icon-selected"
            >done</span
          >
          Leading icon
        </u-chip>
        <u-chip
          toggle
          [selected]="trailingIcon"
          (change)="trailingIcon = $any($event.target).selected; updated$.next()"
        >
          <span
            class="material-symbols-outlined"
            slot="icon-selected"
            >done</span
          >
          Trailing icon
        </u-chip>
        <u-chip
          toggle
          [selected]="showCounter"
          (change)="showCounter = $any($event.target).selected; updated$.next()"
        >
          <span
            class="material-symbols-outlined"
            slot="icon-selected"
            >done</span
          >
          Counter
        </u-chip>
      </u-chip-set>
    </div>

    <div class="field-playground-control">
      <span class="field-playground-label">State</span>
      <u-chip-set>
        <u-chip
          toggle
          [selected]="invalid"
          (change)="invalid = $any($event.target).selected; updated$.next()"
        >
          <span
            class="material-symbols-outlined"
            slot="icon-selected"
            >done</span
          >
          Invalid
        </u-chip>
        <u-chip
          toggle
          [selected]="disabled"
          (change)="disabled = $any($event.target).selected; updated$.next()"
        >
          <span
            class="material-symbols-outlined"
            slot="icon-selected"
            >done</span
          >
          Disabled
        </u-chip>
      </u-chip-set>
    </div>

    <div class="field-playground-control">
      <span class="field-playground-label">Text</span>
      <div class="field-playground-grid">
        <u-text-field
          label="Supporting text"
          [(ngModel)]="supportingText"
          (ngModelChange)="updated$.next()"
          ngDefaultControl
        ></u-text-field>
        <u-text-field
          label="Error text"
          [(ngModel)]="errorText"
          (ngModelChange)="updated$.next()"
          ngDefaultControl
        ></u-text-field>
      </div>
    </div>
  </div>

  <div
    example
    class="field-stage"
  >
    <u-text-field
      label="Name"
      prefix-text="$"
      suffix-text=".00"
      [counter]="showCounter ? '10/100' : ''"
      [supportingText]="supportingText"
      [errorText]="errorText"
      [variant]="variant"
      [invalid]="invalid"
      [disabled]="disabled"
    >
      <span
        class="material-symbols-outlined"
        *ngIf="leadingIcon"
        slot="leading-icon"
        >search
      </span>
      <u-icon-button
        *ngIf="trailingIcon"
        slot="trailing-icon"
        [disabled]="disabled"
      >
        <span class="material-symbols-outlined">cancel</span>
      </u-icon-button>
      <span
        *ngIf="showCounter"
        slot="counter"
        >10/100
      </span>
    </u-text-field>
    <u-text-field
      maxlength="100"
      [variant]="variant"
      [invalid]="invalid"
      [disabled]="disabled"
    >
      <span
        class="material-symbols-outlined"
        *ngIf="leadingIcon"
        slot="leading-icon"
        >search
      </span>
      <u-icon-button
        *ngIf="trailingIcon"
        slot="trailing-icon"
        toggle
        [disabled]="disabled"
      >
        <span class="material-symbols-outlined">cancel</span>
      </u-icon-button>
      <span slot="label">Description</span>
      <span
        *ngIf="supportingText"
        slot="supporting-text"
        id="supporting-text"
        >{{ supportingText }}
      </span>
      <span
        *ngIf="errorText"
        slot="error-text"
        >{{ errorText }}
      </span>
    </u-text-field>
  </div>
</docs-example>

<docs-apis-table key="field"></docs-apis-table>
