<h5 class="u-headline-m article-title">
  <a
    [href]="anchorHash"
    docsAnchorScroll
    >{{ sectionTitle }}</a
  >
</h5>
<div class="description">
  <ng-content></ng-content>
</div>
@if (_html) {
  <div class="example-block" [class.fluid]="fluid" [attr.data-align]="alignment">
    <div class="example-preview">
      @if (renderExample) {
        <div [innerHTML]="htmlSafe"></div>
      } @else {
        <ng-content select="[example]"></ng-content>
      }
    </div>
    <div class="example-code">
      <pre><code [highlight]="_html!" language="html"></code></pre>
    </div>
  </div>
}
